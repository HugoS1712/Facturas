<div class="tickets-container">

    @for (factura of factura; track $index) {
    <div class="ticket-card">

        <div class="header">
            <h3>FACT-{{ factura.numero }}</h3>
            <span class="estado">factura</span>
        </div>

        <p><strong>Cliente:</strong> {{ factura.receptor }}</p>

        <p><strong>Fecha:</strong>
            {{ factura.fecha | date:'dd/MM/yyyy' }}
        </p>

        <p class="total">
            💲 {{ factura.total | number:'1.2-2' }}
        </p>

    </div>
    }

    @empty {
    <h2>No hay facturas para mostrar</h2>
    }

    <a routerLink="/factura" class="btn-crear">
        ➕ Crear nueva factura
    </a>

</div>
