@for(factura of factura; track $index) {
<div class="factura">
    <h2>Factura #{{ factura.numero }}</h2>
    <p>Fecha: {{ factura.fecha | date:'dd/MM/yyyy' }}</p>
    <p>Cliente: {{ factura.receptor }}</p>
    <p>Detalles:</p>
    <p>Total: ${{ factura.total | number:'1.2-2' }}</p>
</div>
} @empty{
<h2>No hay facturas para mostrar</h2>
}
<a routerLink="/factura">Crear nueva factura</a>
