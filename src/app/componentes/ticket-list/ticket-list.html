<h2>Lista de Tickets</h2>

@for (t of tickets; track t.numero) {

<div class="ticket">
    <h3>{{ t.numero }}</h3>

    <p><b>Usuario:</b> {{ t.usuario }}</p>
    <p><b>Equipo:</b> {{ t.equipo }}</p>
    <p><b>Urgencia:</b> {{ t.urgencia }}</p>
    <p><b>Tipo:</b> {{ t.tipo }}</p>
    <p><b>Detalle:</b> {{ t.detalle }}</p>
</div>

} @empty {
<p>No hay tickets creados</p>
}

<div class="acciones">
    <a routerLink="/ticket" class="btn">Crear nuevo ticket</a>
</div>
