<h2 class="titulo">Lista de Tickets</h2>

<div class="contenedor">

    @for (t of tickets; track t.numero) {

    <div class="card">
        <h3>{{ t.numero }}</h3>

        <p><strong>Usuario:</strong> {{ t.usuario }}</p>
        <p><strong>Equipo:</strong> {{ t.equipo }}</p>

        <p>
            <strong>Urgencia:</strong>
            <span class="tag" [ngClass]="t.urgencia">
                {{ t.urgencia }}
            </span>
        </p>

        <p><strong>Tipo:</strong> {{ t.tipo }}</p>

        <p class="detalle">
            <strong>Detalle:</strong> {{ t.detalle }}
        </p>
    </div>

    } @empty {

    <p class="empty">No hay tickets creados</p>

    }

</div>

<div class="acciones">
    <a routerLink="/ticket" class="btn">➕ Crear nuevo ticket</a>
</div>
