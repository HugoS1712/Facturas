<div class="page">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Soporte IT</h2>

    <div class="ticket-box">
      <span>N° Ticket</span>

      @if (ticketNumber) {
      <h1>{{ ticketNumber }}</h1>
      } @else {
      <p class="placeholder">Sin generar</p>
      }

    </div>
  </aside>

  <!-- Contenido -->
  <div class="content">
    <div class="card">

      <h2>Nuevo Ticket</h2>

      <!-- FORM -->
      <form (ngSubmit)="crearTicket()">

        <!-- Usuario -->
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" [(ngModel)]="usuario" name="usuario" required>
        </div>

        <!-- Equipo + urgencia -->
        <div class="row">

          <div class="form-group">
            <label>Equipo</label>
            <input type="text" [(ngModel)]="equipo" name="equipo" required>
          </div>

          <div class="form-group">
            <label>Urgencia</label>
            <select [(ngModel)]="urgencia" name="urgencia" required>
              <option value="">Seleccionar</option>
              <option value="alta">Alta</option>
              <option value="media">Media</option>
              <option value="baja">Baja</option>
            </select>
          </div>

        </div>

        <!-- Tipo -->
        <div class="form-group">
          <label>Tipo</label>
          <select [(ngModel)]="tipo" name="tipo" required>
            <option value="">Seleccionar</option>
            <option value="Hardware">Hardware</option>
            <option value="Software">Software</option>
            <option value="Red">Red</option>
          </select>
        </div>

        <!-- Detalle -->
        <div class="form-group">
          <label>Detalle</label>
          <textarea [(ngModel)]="detalle" name="detalle" required></textarea>
        </div>

        <!-- Botón -->
        <button type="submit">Crear Ticket</button>

      </form>

      <!-- ✅ IR A LISTA -->
      <div class="acciones">
        <a routerLink="/tickets" class="btn">Ver lista de tickets</a>
      </div>

    </div>
  </div>

</div>
