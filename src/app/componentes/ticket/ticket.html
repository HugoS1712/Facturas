<div class="page">
    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Soporte IT</h2>
        <div class="ticket-box">
            <span>N° Ticket</span>
            <!-- Bind dinámico -->
            <h1>{{ ticketNumber || '---' }}</h1>
        </div>
    </aside>

    <!-- Contenido -->
    <div class="content">
        <div class="card">
            <h2>Nuevo Ticket</h2>

            <form>

                <!-- Usuario -->
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" placeholder="Nombre del usuario">
                </div>

                <!-- Equipo + urgencia -->
                <div class="row">
                    <div class="form-group">
                        <label>Equipo en Falla</label>
                        <input type="text" placeholder="Ej: Notebook Dell / PC Oficina">
                    </div>

                    <div class="form-group">
                        <label>Urgencia</label>
                        <select class="urgencia">
                            <option value="alta">🔴 Alta</option>
                            <option value="media">🟡 Media</option>
                            <option value="baja">🟢 Baja</option>
                        </select>
                    </div>
                </div>

                <!-- Categoría -->
                <div class="form-group">
                    <label>Tipo de Problema</label>
                    <select>
                        <option>Hardware</option>
                        <option>Software</option>
                        <option>Red</option>
                        <option>Acceso</option>
                        <option>Otro</option>
                    </select>
                </div>

                <!-- Detalle -->
                <div class="form-group">
                    <label>Detalle del Problema</label>
                    <textarea rows="5" placeholder="Explicá qué está pasando..."></textarea>
                </div>

                <!-- Imagen -->
                <div class="form-group">
                    <label>Adjuntar imagen</label>
                    <input type="file" accept="image/*">
                </div>


                <!-- Botón -->
                <button type="submit">Crear Ticket</button>

            </form>
        </div>
    </div>
</div>
